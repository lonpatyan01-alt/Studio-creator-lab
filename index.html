<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Studio Creator Lab - Broadcast Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@800;900&family=Gulzar&family=Noto+Sans+Arabic:wght@800;900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --accent-gold: #ffcc00;
    --urgent-red: #ff003c;
    --glass-bg: rgba(10, 10, 10, 0.98);
    --gold: #ffcc00;
    --red: #ff003c;
    --dark-glass: rgba(0, 0, 0, 0.92);
    --base-scale: 1cvw; 
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
  }

  body {
    background: #0b0b0b;
    height: 100vh;
    width: 100vw;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* 📺 مین اسٹوڈیو کنٹینر (Ultra-HD Border Effect) */
  .aspect-16-9 {
    position: relative;
    width: 100vw;
    height: 100vh;
    aspect-ratio: 16 / 9;
    background-color: green;
    border: 4px solid #00aaff;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 20px 50px rgba(0, 0, 0, 0.9);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    container-type: size; 
  }

  /* 🔴 لائیو نیچے چلنے والی پٹی (Ticker) - متن بڑا اور صاف */
  .ticker {
    background: linear-gradient(90deg, #300, #900, #ff003c, #900, #300);
    height: 5.2cqh; 
    min-height: 32px;
    display: flex;
    align-items: center;
    box-shadow: 0 -8px 25px rgba(0,0,0,0.6);
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    color: #fff;
    overflow: hidden;
    white-space: nowrap;
    font-size: 4cqh; 
    font-weight: 900;
    border-top: 3px solid #ffcc00;
    border-bottom: 1px solid #ffcc00;
    text-shadow: 2px 2px 3px #000;
  }

  .market-unit {
    background: rgba(0,0,0,0.6);
    padding: 3px 12px;
    border-radius: 4px;
    font-family: 'Courier New', Courier, monospace;
    color: #fff;
    border-left: 3px solid gold;
    font-weight: 900;
    box-shadow: inset 0 0 5px rgba(255,215,0,0.3);
  }

  .ticker-content {
    display: inline-block;
    animation: scroll-left 30s linear infinite;
    padding-left: 100%;
  }

  @keyframes scroll-left {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
  }
/*=====================================*/
  /* 🔥 بریکنگ نیوز ماسٹر کنٹینر - کلاسی لک */
 


  /* 📱 موبائل اسکرینز (9:16) کے لیے خودکار ایڈجسٹمنٹ */
  .aspect-9-16 .breaking-container {
    height: 38cqh !important; 
    flex-direction: column !important; /* موبائل پر انفو پینل اوپر اور امیج نیچے چلی جائے گی */
  }

  .aspect-9-16 .breaking-news-master {
    padding: 1cqh 1cqw !important;
  }

  .aspect-9-16 .breaking-container > div:first-child {
    width: 100% !important;
    height: auto !important;
    flex-direction: row !important;
    border-right: none !important;
    border-bottom: 3px solid #ffcc00;
  }

  .aspect-9-16 .news-main-text {
    font-size: 3.5cqh !important;
  }
 
 
 
 
 /* بریکنگ نیوز بار کی پوزیشن اور سائز */
  .breaking-news-master {
    position: absolute;
    top: 3cqh;
    left: 50%;
    transform: translateX(-50%);
    width: 94cqw; 
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 0.8cqh;
  }

  /* بریکنگ ٹیکسٹ کا فریفیکٹ لک */
  .news-main-text {
    font-family: 'Noto Nastaliq Urdu', 'Gulzar', 'Poppins', serif;
    color: #ffffff;
    width: 100%;
    text-align: left;
  }

  /* 📱 اسمارٹ فونز اور ورٹیکل لائیو اسٹریمز کے لیے فلی رسپانسیو سیٹنگ (9:16) */
  .aspect-9-16 .breaking-container {
    height: 22cqh !important; /* موبائل پر سائز متناسب رکھنے کے لیے */
  }
  
  .aspect-9-16 .news-main-text {
    font-size: 3.2cqh !important; /* چھوٹے فونٹس موبائل اسکرینز کے لیے */
  }

  .aspect-9-16 .breaking-title {
    font-size: 2.5cqh !important;
    padding: 0 2cqw !important;
    min-width: 18cqw !important;
  }

  /* چمکتی ہوئی لائٹ کا اینیمیشن */
  @keyframes blink {
    0% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,0,0,1)); }
    50% { opacity: 0.4; filter: drop-shadow(0 0 2px rgba(255,0,0,0)); }
    100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,0,0,1)); }
  }
 
 
 
 
 

  .breaking-container {
    display: flex;
    background: var(--dark-glass);
    border-left: 0.8cqw solid var(--gold);
    box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 0 15px rgba(255,255,255,0.05);
    height: 11cqh; /* تصویر کے لیے ہائٹ کو تھوڑا بڑا کیا گیا ہے */
    min-height: 60px;
    overflow: hidden;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 4px;
  }

  /* بریکنگ سرخ پٹی چمکتی ہوئی اینیمیشن کے ساتھ */
  .breaking-title {
    background: linear-gradient(135deg, #ffcc00, #ffaa00);
    color: #000;
    font-weight: 900;
    padding: 0 3cqw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4cqh;
    text-transform: uppercase;
    clip-path: polygon(0 0, 100% 0, 88% 100%, 0% 100%);
    min-width: 20cqw;
    font-family: 'Arial Black', sans-serif;
    letter-spacing: -0.5px;
    text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    box-shadow: 5px 0 15px rgba(0,0,0,0.3);
    animation: pulseGlow 2s infinite alternate;
  }

  @keyframes pulseGlow {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.2) drop-shadow(0 0 10px rgba(255,204,0,0.6)); }
  }

  /* 📸 بریکنگ نیوز لائیو ہائی کوالٹی امیج باکس */
  .breaking-image-box {
    width: 14cqh;
    height: 100%;
    background: #222;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 3px solid var(--gold);
    flex-shrink: 0;
  }

  .breaking-image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .breaking-content {
    flex-grow: 1;
    display: flex;
    align-items: center;
    padding: 0 3cqw;
    overflow: hidden;
  }


@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }


  /* 📍 انفو بار سسٹم */
  .info-bar-system {
    display: flex;
    gap: 1cqw;
    padding-left: 0.5cqw;
    width: 100%;
  }

  /* لیفٹ سائیڈ کے چھوٹے انفو باکسز کا اسٹائل جو صاف ٹیکسٹ دکھائے گا */
  .sub-info-unit {
    color: #fff;
    font-size: 2cqh;
    font-weight: 800;
    padding: 6px 10px;
    border-left: 3px solid #ffcc00;
    background: rgba(255,255,255,0.03);
    border-radius: 2px;
    text-transform: uppercase;
    text-shadow: 1px 1px 2px #000;
  }


  .info-unit {
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 0.6cqh 2.5cqw;
    font-size: 2cqh; /* سائز بڑا کیا گیا ہے */
    font-weight: 900;
    border-bottom: 3px solid var(--gold);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    text-transform: uppercase;
    white-space: nowrap;
    border-radius: 2px;
    text-shadow: 1px 1px 2px #000;
  }

  .unit-time { background: #ff003c !important; color: #fff !important; border-bottom: 3px solid #fff; }
  .unit-loc { background: #fff !important; color: #000 !important; font-weight: 900 !important; border-bottom: 3px solid #ffcc00; }
  .unit-cat { background: linear-gradient(to right, #0044cc, #0088ff); color: #fff; }

  /*====================================
  📦 3D لوگو اسٹوڈیو سسٹم ===*/
  .logo-container {
    position: absolute;
    bottom: 9cqh;
    right: 4cqw;
    z-index: 1000;
    width: 8.5cqh;
    height: 8.5cqh;
    min-width: 50px;
    min-height: 50px;
  }

  .scene {
    width: 100%;
    height: 100%;
    position: absolute;
    transform-style: preserve-3d;
    animation: rotateLeft 6s linear infinite;
  }

  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    border: 1.5px solid #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.8);
    background: linear-gradient(145deg, #0033aa, #0066ff);
  }

  .front  { transform: translateZ(calc(8.5cqh / 2)); }
  .back   { transform: rotateY(180deg) translateZ(calc(8.5cqh / 2)); }
  .right  { transform: rotateY(90deg) translateZ(calc(8.5cqh / 2)); }
  .left   { transform: rotateY(-90deg) translateZ(calc(8.5cqh / 2)); }
  .top    { transform: rotateX(90deg) translateZ(calc(8.5cqh / 2)); }
  .bottom { transform: rotateX(-90deg) translateZ(calc(8.5cqh / 2)); }

  @container (max-height: 500px) {
    .front  { transform: translateZ(25px); }
    .back   { transform: rotateY(180deg) translateZ(25px); }
    .right  { transform: rotateY(90deg) translateZ(25px); }
    .left   { transform: rotateY(-90deg) translateZ(25px); }
    .top    { transform: rotateX(90deg) translateZ(25px); }
    .bottom { transform: rotateX(-90deg) translateZ(25px); }
  }

  .header {
    flex: 0 0 25%;
    background: #ffcc00;
    color: #000;
    font-size: 1.2cqh;
    font-weight: 900;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #fff;
  }

  .label {
    flex: 1;
    color: #fff;
    font-size: 2.6cqh;
    font-weight: 900;
    letter-spacing: 1px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-shadow: 2px 2px 3px #000;
  }

  @keyframes rotateLeft {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(-360deg); }
  }

  .aspect-9-16 {
    width: calc(100vh * 9 / 16) !important;
    height: 100vh !important;
    aspect-ratio: 9 / 16 !important;
  }

  .aspect-9-16 .breaking-title {
    font-size: 2.8cqh !important;
    clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%) !important;
    min-width: 22cqw !important;
  }
  
  .aspect-9-16 .news-main-text {
    font-size: 2.6cqh !important;
  }

  .aspect-9-16 .info-bar-system {
    justify-content: space-between !important;
    gap: 0.5cqw !important;
  }

  .aspect-9-16 .info-unit {
    font-size: 1.6cqh !important;
    padding: 0.4cqh 1cqw !important;
    flex-grow: 1;
    text-align: center;
  }

  .aspect-9-16 .logo-container {
    bottom: 8cqh !important;
    right: 4cqw !important;
  }

  .streaming-active {
    cursor: none !important;
    border: none !important;
    border-radius: 0 !important;
  }

  .urdu-text, .breaking-urdu, [style*="direction: rtl"] {
    font-family: 'Noto Nastaliq Urdu', 'Noto Sans Arabic', serif !important;
    font-weight: 700 !important;
    line-height: 2.5 !important;
  }

  .quantum-entry {
    animation: quantumIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }

  @keyframes quantumIn {
    0% { opacity: 0; transform: perspective(500px) rotateX(-90deg); filter: blur(10px); }
    100% { opacity: 1; transform: perspective(500px) rotateX(0deg); filter: blur(0); }
  }
</style>
</head>
<body>

<div class="aspect-16-9" id="mainStudio">




<!-- 🔥 الٹرا ہائی کوالٹی لائیو نیوز مکسر (فل اسکرین امیج ایڈیشن) -->
  <div class="breaking-news-master" style="width: 100cqw; top: 0; left: 0; transform: none; padding: 2cqh 2cqw;">

              <!-- 🔻 نیچے والا انفو کنٹینر (وقت یا اپ ڈیٹس) -->
              <div id="info-bottom-container" style="padding: 1.5cqh; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.05);">

          <!-- 📺 مین لائیو امیج باکس (اب یہ سائز میں بہت بڑا ہے اور خالی اسکرین کو چھپا دے گا) -->
          <div class="breaking-image-box" style="position: relative; flex-grow: 1; height: 100%; overflow: hidden; background: #050505;">

  </div>

<script>
const studio = document.getElementById('mainStudio');

/*==================================================================
 🔷 ULTRA-ADVANCED INTELLIGENT NEWS BROADCAST & MEDIA MIXER ENGINE
 ===================================================================
   * Version: 4.0.0 (Global Live Streaming Edition)
   * Features: Live RSS Image Extraction, Smart Text Mining, 
               Cache-Buster HD Rendering, Dynamic RTL Urdu Translation.
====================================================================*/

const BreakingNewsConfig = {
    sources: [
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.dawn.com/feeds/home",
        "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml",
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.aljazeera.com/xml/rss/all.xml",
        "https://api.rss2json.com/v1/api.json?rss_url=https://tribune.com.pk/feed/home"
    ],
    displayTime: 12000,       /* ہر خبر اسکرین پر بار بار بدلنے کے لیے 12 سیکنڈ کا وقت */
    isUrdu: false,            /* انگریزی اور اردو سائیکل مکسر کنٹرولر */
    newsStack: [],            /* لائیو خبروں کا مین ماسٹر ڈیٹا بیس */
    pointer: 0                /* موجودہ لائیو خبر کا ٹریکر انڈیکس */
};

/**
 * 📍 خبر کے متن سے لائیو لوکیشن اور اہم ترین شہر کا تعین کرنے والا سسٹم
 */
function extractLocation(text) {
    const locations = [
        "KARACHI", "ISLAMABAD", "LAHORE", "PESHAWAR", "QUETTA", "GAZA", 
        "LONDON", "WASHINGTON", "NEW YORK", "TOKYO", "BEIJING", "MOSCOW",
        "UKRAINE", "PALESTINE", "INDIA", "CHINA", "USA", "WORLDWIDE", 
        "RAWALPINDI", "MULTAN", "FAISALABAD", "SARGODHA", "SIALKOT", "PARIS",
        "GUJRANWALA", "HYDERABAD", "KABUL", "DUBAI", "RIYADH", "LEBANON", "SYRIA"
    ];
    const found = locations.find(loc => text.toUpperCase().includes(loc));
    return found || "LATEST"; 
}

/**
 * 🧠 ایڈوانسڈ ٹیکسٹ مائننگ انجن: خبر کے ٹائٹل سے اصل اور سب سے اہم کی ورڈ تلاش کرنا
 */
function getNewsImageKeyword(title) {
    const text = title.toLowerCase().replace(/[^\w\s]/gi, ''); // فالتو پنکچویشن صاف کرنا
    const words = text.split(" ");

    // 1. سب سے پہلے اہم کیٹیگریز اور حساس ٹاپکس کا ہائی لیول میچ
    if(text.includes("gold") || text.includes("price") || text.includes("currency") || text.includes("stock") || text.includes("rupee") || text.includes("dollar") || text.includes("economy")) return "finance,charts,money";
    if(text.includes("crypto") || text.includes("btc") || text.includes("bitcoin")) return "bitcoin,cryptocurrency";
    if(text.includes("killed") || text.includes("gaza") || text.includes("explosion") || text.includes("attack") || text.includes("bomb") || text.includes("war") || text.includes("strike") || text.includes("missile") || text.includes("military") || text.includes("army")) return "war,explosion,military,smoke";
    if(text.includes("cricket") || text.includes("match") || text.includes("won") || text.includes("trophy") || text.includes("sports") || text.includes("babar") || text.includes("t20") || text.includes("football") || text.includes("fifa") || text.includes("stadium")) return "stadium,sports,cricket";
    if(text.includes("weather") || text.includes("rain") || text.includes("flood") || text.includes("storm") || text.includes("heatwave") || text.includes("monsoon") || text.includes("lightning")) return "heavy-rain,storm,weather";
    if(text.includes("court") || text.includes("imran khan") || text.includes("police") || text.includes("arrest") || text.includes("election") || text.includes("supreme court") || text.includes("pm") || text.includes("parliament") || text.includes("minister") || text.includes("biden") || text.includes("trump")) return "politics,parliament,courtroom";
    if(text.includes("fire") || text.includes("accident") || text.includes("crash") || text.includes("highway") || text.includes("train") || text.includes("blaze")) return "fire-rescue,accident,ambulance";
    if(text.includes("nasa") || text.includes("space") || text.includes("ai") || text.includes("tech") || text.includes("robot") || text.includes("cyber") || text.includes("google")) return "technology,space,cyber";
    if(text.includes("health") || text.includes("virus") || text.includes("hospital") || text.includes("doctor") || text.includes("covid")) return "hospital,medical,health";

    // 2. اگر کوئی فکس کی ورڈ میچ نہ ہو، تو خبر کے مڈل میں سے لمبا لفظ نکالنا (جو عام طور پر نام یا اہم ٹاپک ہوتا ہے)
    const longWords = words.filter(w => w.length > 5);
    if(longWords.length > 0) {
        return `${longWords[0]},${longWords[1] || 'news'}`; // خبر کا اصل موضوع تصویر کے لیے بھیجیں
    }

    return "breaking-news,news-broadcast,studio"; /* فلی سیف گلوبل ڈیفالٹ */
}

/**
 * 📡 انٹرنیشنل آر ایس ایس فیڈز سے ریئل ٹائم خبریں اور ان کی اصلی تصاویر لوڈ کرنے والا سسٹم
 */
async function loadBreakingNews() {
    let allFeeds = [];
    const cacheBuster = `&_cb=${new Date().getTime()}`; // کیشے فریز سے بچنے کے لیے لازمی ہے
    
    for (let url of BreakingNewsConfig.sources) {
        try {
            const res = await fetch(url + cacheBuster);
            const data = await res.json();
            if (data.status === 'ok' && data.items) {
                data.items.forEach(item => {
                    // آر ایس ایس کے مختلف فارمیٹس سے خبر کی اصل امیج (Thumbnail) نکالنے کی ہائی ٹیک کوشش
                    let extractedImg = "";
                    if (item.enclosure && item.enclosure.link) {
                        extractedImg = item.enclosure.link;
                    } else if (item.thumbnail) {
                        extractedImg = item.thumbnail;
                    } else if (item.description && item.description.includes("<img")) {
                        // اگر امیج ڈیسکرپشن ٹیگ کے اندر چھپی ہو تو اسے فلٹر کرنا
                        const match = item.description.match(/src="([^"]+)"/);
                        if(match) extractedImg = match[1];
                    }

                    allFeeds.push({
                        title: item.title,
                        rawTime: new Date(item.pubDate || new Date()), 
                        category: item.categories[0] || "WORLD NEWS",
                        originalImage: extractedImg // خبر کی اپنی لائیو تصویر کا ڈیٹا
                    });
                });
            }
        } catch (e) { console.log("Live Feed Sync Error, Switching to Safe Channel Mode."); }
    }

    if(allFeeds.length > 0) {
        // خبروں کو مکس کرنا تاکہ اسکرین پر ورائٹی برقرار رہے
        BreakingNewsConfig.newsStack = allFeeds.sort(() => Math.random() - 0.5);
    }
}

/**
 * 📺 الٹرا ایچ ڈی لائیو رینڈرنگ پینل (مین کور انجن)
 */
async function updateBreakingUI() {
    if (BreakingNewsConfig.newsStack.length === 0) {
        // اگر ڈیٹا بیس خالی ہو تو دوبارہ فیڈ لوڈ کرنے کی کوشش کریں
        await loadBreakingNews();
        if (BreakingNewsConfig.newsStack.length === 0) return;
    }
    
    const news = BreakingNewsConfig.newsStack[BreakingNewsConfig.pointer];
    const textElem = document.getElementById("fake-news");
    const titleElem = document.getElementById("news-text");
    const infoTop = document.getElementById("info-top-container");
    const infoBottom = document.getElementById("info-bottom-container");
    const imgElem = document.getElementById("news-image");
    const liveIndicator = document.getElementById("live-indicator");

    const timeDiff = Math.floor((new Date() - news.rawTime) / 60000); 
    const timeDisplay = isNaN(timeDiff) || timeDiff > 60 ? "LIVE FEED" : `${timeDiff} MINS AGO`;
    const location = extractLocation(news.title);

    // سٹوڈیو بیپ ساؤنڈ ایفیکٹ
    new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play().catch(()=>{});

    // 🔺 اوپر والے انفو کنٹینر کا ڈیٹا (لوکیشن + کیٹیگری)
    if (infoTop) {
        infoTop.innerHTML = `
            <div class="sub-info-unit quantum-entry" style="color: #ffcc00; margin-bottom: 4px;">📍 ${location}</div>
            <div class="sub-info-unit quantum-entry" style="color: #00ff88;">🔥 ${news.category.toUpperCase()}</div>
        `;
    }

    // 🔻 نیچے والے انفو کنٹینر کا ڈیٹا (وقت)
    if (infoBottom) {
        infoBottom.innerHTML = `
            <div class="sub-info-unit quantum-entry" style="border-left-color: #ff003c; color: #fff;">🕒 ${timeDisplay}</div>
        `;
    }

    /* 📸 الٹرا میڈیا لنکر - خبر کے عین مطابق امیج بدلنے والا ماسٹر لاجک */
    const keyword = getNewsImageKeyword(news.title);
    
    // سمارٹ لائیو انڈیکیٹر موڈز
    if(liveIndicator) {
        if(keyword.includes("war") || keyword.includes("explosion") || keyword.includes("stadium") || keyword.includes("fire")) {
            liveIndicator.style.display = "block";
            liveIndicator.style.background = "#ff003c";
            liveIndicator.textContent = "LIVE VIDEO";
        } else {
            liveIndicator.style.display = "block";
            liveIndicator.style.background = "#007eff"; 
            liveIndicator.textContent = "LIVE FEED";
        }
    }

    // 📺 1080p فل اسکرین ایچ ڈی امیج پروسیسر
    if(imgElem) {
        imgElem.style.transition = "opacity 0.4s ease-in-out, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)";
        imgElem.style.opacity = "0.1"; // نئی امیج لوڈ ہوتے وقت ہلکا سا سیملیس ڈِم ایفیکٹ
        imgElem.style.transform = "scale(1.05)"; 
        
        let finalImageSource = "";

        // اگر نیوز ایجنسی کی طرف سے خبر کی اپنی اصلی اور لائیو تصویر موجود ہے، تو سب سے پہلے اسے چلائیں
        if(news.originalImage && news.originalImage.trim() !== "") {
            finalImageSource = news.originalImage;
        } else {
            // اگر اپنی تصویر نہ ہو تو این ایل پی کی ورڈ کے ذریعے Unsplash سے 1920x1080 ہائی ریزولوشن تصویر اٹھائیں
            const uniqueSignature = Math.floor(Math.random() * 999999);
            finalImageSource = `https://images.unsplash.com/featured/1920x1080/?${keyword}&sig=${uniqueSignature}`;
        }
        
        // بیک اپ اسٹوڈیو امیج (اگر دونوں لنکس نیٹ ورک ایشو کی وجہ سے فیل ہو جائیں)
        const backupStudioImg = `https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=1920&auto=format&fit=crop&q=90`; 
        
        // ہائی اسپیڈ پری لوڈر انجن تاکہ اسکرین بلینک نہ ہو
        const imgPreloader = new Image();
        imgPreloader.src = finalImageSource;
        
        imgPreloader.onload = () => { 
            imgElem.src = finalImageSource;
            imgElem.style.opacity = "1"; 
            imgElem.style.transform = "scale(1)";
        };
        imgPreloader.onerror = () => { 
            imgElem.src = backupStudioImg; 
            imgElem.style.opacity = "1";
            imgElem.style.transform = "scale(1)";
        };
    }

    // 🔀 ٹیکسٹ رینڈرنگ اینڈ پریمبر ٹرانسلیشن سائیکل
    if (!BreakingNewsConfig.isUrdu) {
        titleElem.textContent = "BREAKING";
        titleElem.style.background = "linear-gradient(135deg, #ffcc00, #ffaa00)"; 
        titleElem.style.color = "#000";
        textElem.textContent = news.title;
        textElem.style.color = "#ffffff";
        textElem.style.direction = "ltr";
        BreakingNewsConfig.isUrdu = true;
    } else {
        titleElem.textContent = "بریکنگ نیوز";
        titleElem.style.background = "linear-gradient(135deg, #ff003c, #990022)";
        titleElem.style.color = "#fff";
        try {
            const tr = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ur&dt=t&q=${encodeURI(news.title)}`);
            const res = await tr.json();
            textElem.textContent = res[0][0][0];
        } catch (e) { textElem.textContent = news.title; }
        
        textElem.style.color = "#ffcc00"; /* پریمیم لائیو اسٹریمنگ لک کے لیے برائٹ گولڈن ٹیکسٹ */
        textElem.style.direction = "rtl";
        BreakingNewsConfig.isUrdu = false;
        
        // صرف خبر کا مکمل چکر (English + Urdu) مکمل ہونے پر ہی اگلی خبر پر جائیں
        BreakingNewsConfig.pointer = (BreakingNewsConfig.pointer + 1) % BreakingNewsConfig.newsStack.length;
    }

    // متحرک انٹری اینیمیشن ری فائر
    textElem.classList.remove("quantum-entry");
    void textElem.offsetWidth; 
    textElem.classList.add("quantum-entry");
}

// ⏳ انجن کک اسٹارٹ اپ اور آٹو ہاور بیک گراؤنڈ سنکرونائزر
setInterval(updateBreakingUI, BreakingNewsConfig.displayTime);
loadBreakingNews().then(() => {
    // جیسے ہی پہلی بار فیڈز لوڈ ہوں، یو آئی کو فورا رینڈر کریں
    setTimeout(updateBreakingUI, 1000);
});

// ہر 10 منٹ بعد بیک گراؤنڈ میں نئی خبریں آٹو ری لوڈ کرنے کا ماسٹر پلان تاکہ لائیو اسٹریم کبھی پرانی خبریں نہ دکھائے
setInterval(loadBreakingNews, 600000);


/* ========================================================================
   🚀 2. THE QUANTUM INFINITY TICKER (ULTRA-ADVANCED EDITION)
   ======================================================================== */
const TickerConfig = {
    content: document.querySelector('.ticker-content'),
    container: document.querySelector('.ticker'),
    refreshRate: 300000, 
    sources: [
        "https://api.rss2json.com/v1/api.json?rss_url=https://www.dawn.com/feeds/home",
        "https://api.rss2json.com/v1/api.json?rss_url=https://tribune.com.pk/feed/home",
        "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"
    ]
};

async function getLiveMarketData() {
    const goldPrice = "Gold: 234,500/-";
    const btcPrice = "BTC: $64,230";
    return `<span class="market-unit"> 💹 ${goldPrice} </span> | <span class="market-unit"> 🪙 ${btcPrice} </span>`;
}

function getNewsStyling(title) {
    const alertKeywords = ["breaking", "killed", "died", "explosion", "urgent", "دھماکہ", "افسوسناک", "شدید"];
    const successKeywords = ["won", "gold", "launched", "victory", "کامیابی", "جیت", "اعزاز"];
    
    let style = "color: #fff;"; 
    let icon = "🔴";

    if (alertKeywords.some(word => title.toLowerCase().includes(word))) {
        style = "color: #ff3366; font-weight: 900; text-shadow: 0 0 10px rgba(255,0,0,0.8);";
        icon = "🚨";
    } else if (successKeywords.some(word => title.toLowerCase().includes(word))) {
        style = "color: #00ff88; font-weight: 900;";
        icon = "🏆";
    }
    
    return { style, icon };
}

async function buildAdvancedTicker() {
    let finalTickerHTML = [];
    finalTickerHTML.push(`<span style="background: #000; color: #ffcc00; padding: 2px 15px; border-radius: 5px; font-weight:900;"> ⚡ SMART MEDIA POINT EXCLUSIVE </span>`);

    const marketInfo = await getLiveMarketData();
    finalTickerHTML.push(marketInfo);

    for (let url of TickerConfig.sources) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.status === 'ok') {
                data.items.slice(0, 10).forEach(item => {
                    const styling = getNewsStyling(item.title);
                    finalTickerHTML.push(`
                        <span style="${styling.style}"> 
                            ${styling.icon} ${item.title.trim()} 
                        </span>
                    `);
                });
            }
        } catch(e) { console.warn("Ticker Fetch Error"); }
    }

    finalTickerHTML.push(`<span style="color:cyan; font-weight:900;"> 📱 WhatsApp: 03162913305 </span>`);
    finalTickerHTML.push(`<span style="color:yellow; font-weight:900;"> 🔔 Subscribe "Smart Media Point" for more updates </span>`);

    const tickerString = finalTickerHTML.join(' <span style="color:#ffcc00; font-weight:bold;"> || </span> ');
    TickerConfig.content.innerHTML = tickerString + " | " + tickerString + " | " + tickerString;

    adjustTickerSpeed();
}

function adjustTickerSpeed() {
    const scrollWidth = TickerConfig.content.scrollWidth;
    const duration = scrollWidth / 90; 
    TickerConfig.content.style.animation = "none";
    void TickerConfig.content.offsetWidth; 
    TickerConfig.content.style.animation = `scroll-left ${duration}s linear infinite`;
}

buildAdvancedTicker();
setInterval(buildAdvancedTicker, TickerConfig.refreshRate);
window.addEventListener('resize', adjustTickerSpeed);

/* ============================================================
   3. SYSTEM CLOCK & INITIALIZER
   ============================================================ */
function startGlobalSystem() {
    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        const dateStr = now.toLocaleDateString('ur-PK', { day: 'numeric', month: 'long', weekday: 'long' });
        
        if(document.getElementById('liveTime')) document.getElementById('liveTime').innerHTML = `<span style="color:red; animation: blink 1s infinite;">●</span> ${timeStr}`;
        if(document.getElementById('liveDate')) document.getElementById('liveDate').textContent = dateStr;
    }, 1000);

    setInterval(loadBreakingNews, 600000);
}

startGlobalSystem();

function updateLiveTime() {
  const now = new Date();
  const timeElem = document.getElementById('liveTime');
  const dateElem = document.getElementById('liveDate');
  if(timeElem) timeElem.textContent = now.toLocaleTimeString('en-PK', {hour:'2-digit', minute:'2-digit'});
  if(dateElem) dateElem.textContent = now.toLocaleDateString('en-PK', {day:'numeric', month:'short'});
}
setInterval(updateLiveTime, 1000);
